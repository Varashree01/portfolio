<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<meta name="description" content="Varashree H A â€” AI Engineer, Research Enthusiast and Full Stack Developer. An IDE-inspired portfolio.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400..700&family=Inter:wght@300..600&family=JetBrains+Mono:wght@300..600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cosmic-layer"><canvas id="starfield"></canvas></div>
<div class="nebula-field" aria-hidden="true"><div class="nebula n1"></div><div class="nebula n2"></div></div>

<div class="ide-shell">
<div class="ide" id="ide">

  <!-- ============ TITLE BAR ============ -->
  <div class="menurow">
    <div class="tb-dots"><span class="tb-dot r"></span><span class="tb-dot y"></span><span class="tb-dot g"></span></div>
    <button class="tb-menu-btn" id="menuBtn" aria-label="Toggle explorer">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
    <div class="menu-items">
      <span>File</span><span>Edit</span><span>View</span><span>Go</span>
      <span id="menuRun">Run</span><span id="menuTerminal">Terminal</span><span id="menuHelp">Help</span>
    </div>
  </div>
  <div class="titlebar">
    <div class="tb-title"><span class="dot-live"></span>varashree-ha â€” workspace</div>
    <button class="tb-search" id="tbSearch">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>varashree-ha : portfolio</span>
      <kbd id="cpKbd">Ctrl K</kbd>
    </button>
    <div class="tb-actions">
      <button class="tb-icon-btn" id="terminalToggleBtn" aria-label="Toggle terminal">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9l3 3-3 3M13 15h4"/></svg>
      </button>
    </div>
  </div>

  <div class="ide-body">
    <!-- ============ ACTIVITY BAR ============ -->

    <div class="activitybar">
      <button class="ab-icon active" id="abExplorer" title="Explorer">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 4h6l2 2h8v12a2 2 0 0 1-2 2H4z"/></svg>
      </button>
      <button class="ab-icon" id="abSearch" title="Search (Ctrl K)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="ab-icon" id="abTerminal" title="Terminal (Ctrl J)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9l3 3-3 3M13 15h4"/></svg>
      </button>
      <div class="ab-spacer"></div>
      <button class="ab-icon" id="abContact" title="Contact">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="8" r="3.4"/><path d="M5 20c1.2-3.6 4-5.4 7-5.4s5.8 1.8 7 5.4"/></svg>
      </button>
    </div>

    <!-- ============ SIDEBAR ============ -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header"><span>Explorer</span></div>
      <div class="sidebar-scroll">
        <div class="workspace-name">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 6 6 1-4.5 4.5L18 20l-6-3-6 3 1.5-6.5L3 9l6-1z"/></svg>
          VARASHREE-HA
        </div>
        <ul class="tree" id="tree"><!-- built by JS --></ul>
      </div>
    </div>

    <!-- ============ MAIN ============ -->
    <div class="main">
      <div class="tabbar" id="tabbar"></div>
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="editor-scroll" id="editorScroll">
        <div class="editor-content" id="editorContent"></div>
      </div>

      <!-- ============ PANEL ============ -->
      <div class="panel" id="panel">
        <div class="panel-tabs">
          <button class="panel-tab" data-ptab="problems">Problems</button>
          <button class="panel-tab" data-ptab="output">Output</button>
          <button class="panel-tab active" data-ptab="terminal">Terminal</button>
          <button class="panel-close" id="panelCloseBtn" aria-label="Close panel">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>
          </button>
        </div>
        <div class="panel-body" id="panelBody"></div>
      </div>
    </div>
  </div>

  <!-- ============ STATUS BAR ============ -->
  <div class="statusbar">
    <div class="sb-left">
      <span class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 3v12M6 15a3 3 0 1 0 0 6 3 3 0 0 0 0-6zM18 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM18 9v3a4 4 0 0 1-4 4H6"/></svg> main</span>
      <span class="sb-item hide-mobile">0 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg></span>
      <span class="sb-item hide-mobile" id="sbFile">home.tsx</span>
    </div>
    <div class="sb-right">
      <span class="sb-item hide-mobile" id="sbLang">TypeScript React</span>
      <span class="sb-item hide-mobile">UTF-8</span>
      <span class="sb-item">Bengaluru, IN</span>
      <span class="sb-item" id="sbClock">--:--:--</span>
    </div>
  </div>

</div>
</div>

<!-- ============ COMMAND PALETTE ============ -->
<div class="cp-overlay" id="cpOverlay">
  <div class="cp-panel">
    <div class="cp-input-row">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="cp-input" id="cpInput" type="text" placeholder="Search files or type a commandâ€¦" autocomplete="off" spellcheck="false">
    </div>
    <div class="cp-list" id="cpList"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
